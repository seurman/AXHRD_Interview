<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hex Node · 육각 노드 · 6-input → 1 focus -->
  <!-- Hexagon outline (ink) -->
  <path d="M 32 5 L 55.4 18.5 L 55.4 45.5 L 32 59 L 8.6 45.5 L 8.6 18.5 Z"
        stroke="#1F1A17" stroke-width="2.6"
        stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <!-- 6 spokes from vertices → center circle edge -->
  <g stroke="#1F1A17" stroke-width="2.2" stroke-linecap="round" opacity="0.85">
    <line x1="32"   y1="5"    x2="32"   y2="24"/>
    <line x1="55.4" y1="18.5" x2="39.4" y2="27.75"/>
    <line x1="55.4" y1="45.5" x2="39.4" y2="36.25"/>
    <line x1="32"   y1="59"   x2="32"   y2="40"/>
    <line x1="8.6"  y1="45.5" x2="24.6" y2="36.25"/>
    <line x1="8.6"  y1="18.5" x2="24.6" y2="27.75"/>
  </g>
  <!-- Central node · coral -->
  <circle cx="32" cy="32" r="8" fill="#D64A2C"/>
  <circle cx="32" cy="32" r="13" fill="#D64A2C" opacity="0.14"/>
</svg>
