services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-in-postgres
    environment:
      POSTGRES_USER: hrin
      POSTGRES_PASSWORD: hrin
      POSTGRES_DB: hr_in_solution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrin -d hr_in_solution"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: hr-in-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/hrin_graph_2026
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  irt-engine:
    build:
      context: ./services/irt-engine
      dockerfile: Dockerfile
    container_name: hr-in-irt
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  neo4j_data:
